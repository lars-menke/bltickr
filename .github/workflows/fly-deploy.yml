name: Deploy to Fly.io

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Volume anlegen (falls nicht vorhanden)
        run: |
          if ! flyctl volumes list -a bltickr | grep -q bl_data; then
            flyctl volumes create bl_data --region fra --size 1 -a bltickr -y
          else
            echo "Volume bl_data existiert bereits."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --config server/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
