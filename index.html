<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BL TICK-R</title>
<meta name="theme-color" content="#08080e">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="vapid-public-key" content="BEEsDkDCI4kgL_rCvJvqxjr2OmjWhY4_BRPjAMqAB_UayX3x0ygogmiJ7aTlKB3f36XskIm1s-LHXXfkgFIhZq4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08080e; --s1:#10101a; --s2:#17172a; --s3:#1f1f38;
  --border:#252540; --border2:#303060;
  --acc:#e4ff3c; --acc2:#3cffe0;
  --green:#3cff8f; --orange:#ffb03c; --red:#ff4d6a; --purple:#c084fc;
  --white:#f0f4ff; --text:#dde0f5; --muted2:#8888aa; --muted:#5a5a80;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .4s ease}
#splash.gone{opacity:0;pointer-events:none}
.spl-logo{opacity:0;transform:scale(.5);animation:spl-lg .5s cubic-bezier(.4,0,.2,1) .3s forwards}
.spl-name{opacity:0;font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:10px;color:var(--acc);animation:spl-in .4s ease .9s forwards}
.spl-sub{opacity:0;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);animation:spl-in .4s ease 1.1s forwards}
.spl-bar{width:180px;height:1px;background:var(--border);overflow:hidden;opacity:0;animation:spl-in .3s ease 1.3s forwards}
.spl-bar::after{content:'';display:block;width:0;height:100%;background:var(--acc);animation:spl-fill .8s ease 1.5s forwards}
@keyframes spl-lg{to{opacity:1;transform:scale(1)}}
@keyframes spl-in{to{opacity:1}}
@keyframes spl-fill{to{width:100%}}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:10px}
.hdr-logo{width:28px;height:28px;flex-shrink:0}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:5px;color:var(--acc);line-height:1}
.hdr-sub{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-top:1px}
.hdr-sp{flex:1}
.live-badge{font-family:'DM Mono',monospace;font-size:.57rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);border:1px solid var(--red);padding:2px 8px;border-radius:3px;animation:blink 1.4s ease-in-out infinite;display:none;user-select:none}
.live-badge.on{display:block}
.live-badge.link{cursor:pointer;color:var(--acc);border-color:var(--acc)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-btn{background:var(--s2);border:1px solid var(--border2);border-radius:4px;color:var(--muted2);cursor:pointer;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;display:flex;align-items:center;gap:5px;transition:color 150ms,border-color 150ms;white-space:nowrap}
.hdr-btn:hover{color:var(--white);border-color:var(--acc)}
.hdr-btn.active{color:var(--acc);border-color:var(--acc)}
.hdr-btn svg{width:12px;height:12px;flex-shrink:0}
.hdr-btn.spinning svg{animation:spin .7s linear infinite}
.hdr-btn-test{border-color:var(--acc);color:var(--acc);opacity:.6}
.hdr-btn-test:hover{opacity:1;background:rgba(228,255,60,.08)}
/* refresh pulse on header timestamp */
.refresh-ts{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);white-space:nowrap}

/* TOAST NOTIFICATION */
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--s1);border:1px solid var(--border2);border-radius:6px;padding:12px 14px;min-width:240px;max-width:320px;display:flex;gap:10px;align-items:flex-start;pointer-events:all;animation:toast-in .25s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.toast.out{animation:toast-out .25s cubic-bezier(.4,0,.2,1) forwards}
.toast-ico{font-size:1.2rem;flex-shrink:0;line-height:1}
.toast-body{}
.toast-title{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;color:var(--white)}
.toast-msg{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted2);margin-top:2px;letter-spacing:.5px}
.toast-sub{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.5px;color:var(--muted2);margin-top:2px}
@keyframes toast-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-out{to{opacity:0;transform:translateY(12px)}}

/* MATCHDAY NAV */
.md-nav{background:var(--s1);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;min-height:44px}
.md-nav::-webkit-scrollbar{display:none}
.md-tab{font-family:'DM Mono',monospace;font-size:.63rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;padding:13px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:color 150ms,border-color 150ms}
.md-tab:hover{color:var(--text)}
.md-tab.active{color:var(--acc);border-bottom-color:var(--acc)}

/* MAIN */
main{padding-bottom:48px}
.day-hd{padding:18px 32px 8px;font-family:'DM Mono',monospace;font-size:.61rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.day-hd::before{content:'⬡';color:var(--border2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;padding:0 32px 4px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color 150ms,transform 150ms}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.c-head{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--s2);border-bottom:1px solid var(--border)}
.chip{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:12px;display:inline-flex;align-items:center;gap:4px}
.chip-f{background:rgba(90,90,128,.18);color:var(--muted2)}
.chip-s{background:rgba(60,255,224,.07);color:var(--acc2);border:1px solid rgba(60,255,224,.2)}
.chip-l{background:rgba(255,77,106,.14);color:var(--red);border:1px solid rgba(255,77,106,.28);animation:blink 1.4s ease-in-out infinite}
.cdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.c-venue{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);max-width:175px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.c-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:14px 12px}
.tm{display:flex;flex-direction:column;align-items:flex-start;gap:5px}
.tm.away{align-items:flex-end}
.tm-logo{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--s3);border:1px solid var(--border);overflow:hidden}
.tm-logo img{width:28px;height:28px;object-fit:contain;filter:drop-shadow(0 0 2px rgba(0,0,0,.7))}
.tm-logo span{font-family:'Bebas Neue',sans-serif;font-size:.72rem;color:var(--muted2)}
.tm-name{font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:600;color:var(--white);line-height:1.2}
.tm-short{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2)}
.sbox{background:var(--s2);border:1px solid var(--border2);border-radius:6px;min-width:74px;text-align:center;padding:6px 8px}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:5px;color:var(--acc);line-height:1}
.sv.up{color:var(--muted2);font-size:1.1rem;letter-spacing:3px}
.sl{font-family:'DM Mono',monospace;font-size:.49rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.pbar{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--border)}
.pc{padding:6px 8px;text-align:center;border-right:1px solid var(--border);font-family:'DM Mono',monospace}
.pc:last-child{border-right:none}
.pc.w{background:rgba(255,255,255,.04)}
.pl{font-size:.49rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
.pv{font-size:.75rem;font-weight:500}
.pv-h{color:var(--acc)}.pv-d{color:var(--muted2)}.pv-a{color:var(--acc2)}
.pv-g{color:var(--green)}.pv-r{color:var(--red)}

/* STATE */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 32px;gap:12px}
.state .ico{font-size:2rem;opacity:.35}
.state .lbl{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.spin{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.api-note{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;padding:8px 32px 0}

/* VIEW TOGGLE */
.view-tabs{background:var(--s1);border-bottom:1px solid var(--border);padding:8px 32px;display:flex;align-items:center;gap:8px}

/* LEAGUE SEGMENT */
.league-seg{display:flex;align-items:center;background:var(--s2);border:1px solid var(--border2);border-radius:4px;overflow:hidden;flex-shrink:0}
.lseg{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-right:1px solid var(--border);padding:6px 12px;cursor:pointer;transition:color 150ms,background 150ms;white-space:nowrap;line-height:1}
.lseg:last-child{border-right:none}
.lseg.active{color:var(--acc);background:rgba(228,255,60,.1)}
.lseg:hover:not(.active){color:var(--text)}

/* FAVORITES CHIPS */
.fav-chip{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.5px;text-transform:uppercase;background:var(--s2);border:1px solid var(--border2);border-radius:4px;color:var(--muted2);cursor:pointer;padding:6px 10px;transition:all 150ms;white-space:nowrap}
.fav-chip.active{background:rgba(228,255,60,.1);border-color:var(--acc);color:var(--acc)}
.fav-chip:hover:not(.active){border-color:var(--muted);color:var(--text)}

/* TABLE VIEW */
#tableView{display:none;padding:24px 32px 48px}
#tableView.visible{display:block}
.tbl-wrap{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tbl-head{display:grid;grid-template-columns:32px 32px 1fr 36px 36px 36px 36px 52px 52px 48px;gap:0;padding:8px 14px;background:var(--s2);border-bottom:1px solid var(--border)}
.tbl-head span{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:center}
.tbl-head .th-team{text-align:left}
.tbl-row{display:grid;grid-template-columns:32px 32px 1fr 36px 36px 36px 36px 52px 52px 48px;gap:0;padding:10px 14px;border-bottom:1px solid var(--border);align-items:center;transition:background 150ms}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--s2)}
.tbl-row.zone-cl{border-left:3px solid var(--acc2)}
.tbl-row.zone-uel{border-left:3px solid var(--orange)}
.tbl-row.zone-rel{border-left:3px solid var(--red)}
.tbl-row.zone-rego{border-left:3px solid var(--purple)}
.t-pos{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted2);text-align:center;letter-spacing:1px}
.t-pos.top{color:var(--acc)}
.t-logo{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--s3);overflow:hidden;margin:0 auto}
.t-logo img{width:18px;height:18px;object-fit:contain}
.t-logo span{font-family:'Bebas Neue',sans-serif;font-size:.55rem;color:var(--muted2)}
.t-name{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:var(--white);padding-left:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-val{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text);text-align:center}
.t-val.pts{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--acc);letter-spacing:1px}
.t-val.diff.pos{color:var(--green)}
.t-val.diff.neg{color:var(--red)}
.tbl-legend{display:flex;gap:18px;padding:12px 14px;border-top:1px solid var(--border);flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:.53rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted2)}
.leg-dot{width:8px;height:3px;border-radius:1px}

/* PANEL */
#ov{position:fixed;inset:0;z-index:200;background:rgba(8,8,14,.65);opacity:0;pointer-events:none;transition:opacity 250ms cubic-bezier(.4,0,.2,1)}
#ov.on{opacity:1;pointer-events:all}
#pnl{position:fixed;top:0;right:0;bottom:0;width:440px;z-index:201;background:var(--s1);border-left:1px solid var(--border2);transform:translateX(100%);transition:transform 250ms cubic-bezier(.4,0,.2,1);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
#pnl.on{transform:translateX(0)}
.pbar2{position:sticky;top:0;background:var(--s1);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:10px;z-index:10}
.pclose{background:var(--s2);border:1px solid var(--border2);border-radius:4px;color:var(--muted2);cursor:pointer;font-size:.85rem;padding:4px 10px;font-family:'DM Mono',monospace;transition:color 150ms,border-color 150ms}
.pclose:hover{color:var(--white);border-color:var(--acc)}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:4px;color:var(--white)}
.phero{padding:22px 18px 18px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.pteam{display:flex;flex-direction:column;gap:6px}
.pteam.r{align-items:flex-end}
.plogo{width:48px;height:48px;border-radius:50%;background:var(--s3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden}
.plogo img{width:36px;height:36px;object-fit:contain}
.pname{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;color:var(--white);line-height:1.25}
.pname.r{text-align:right}
.pabb{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.pscore{background:var(--s2);border:1px solid var(--border2);border-radius:6px;text-align:center;padding:10px 14px;min-width:90px}
.ps{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:7px;color:var(--acc);line-height:1}
.ps.up{color:var(--muted2);font-size:1.4rem;letter-spacing:4px}
.psl{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.pht{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted2);text-align:center;margin-top:3px}
.pmeta{padding:10px 18px;display:flex;flex-wrap:wrap;gap:14px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:.59rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted2)}
.pmi{display:flex;align-items:center;gap:5px}
.sec{padding:14px 18px;border-bottom:1px solid var(--border)}
.sechd{font-family:'DM Mono',monospace;font-size:.59rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sechd::before{content:'';display:block;width:3px;height:3px;border-radius:50%;background:var(--acc)}
.evlist{display:flex;flex-direction:column;gap:7px}
.evrow{display:grid;grid-template-columns:38px 26px 1fr;align-items:center;gap:8px;background:var(--s2);border-radius:4px;padding:8px 10px}
.evmin{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--acc);letter-spacing:1px}
.evico{text-align:center;font-size:1rem;line-height:1}
.evp{font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;color:var(--white)}
.evd{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.5px;color:var(--muted2);margin-top:2px}
.empty{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;padding:18px}

@media(max-width:768px){
  header{padding:0 14px;gap:8px}
  .hdr-logo{width:26px;height:26px}
  .hdr-title{font-size:1.1rem;letter-spacing:4px}
  .hdr-sub{display:none}
  .hdr-btn{padding:6px 8px;gap:0}
  .hdr-btn-label{display:none}  /* Icon-only on mobile */
  .hdr-btn svg{width:14px;height:14px}
  .refresh-ts{display:none}
  .md-nav,.view-tabs{padding-left:18px;padding-right:18px}
  .day-hd{padding-left:18px;padding-right:18px}
  .grid{padding:0 18px 4px;grid-template-columns:1fr}
  #pnl{width:100vw}
  #tableView{padding:16px 18px 48px}
  .tbl-head,.tbl-row{grid-template-columns:28px 28px 1fr 30px 30px 30px 30px 44px 38px 40px;padding:8px 10px}
  .t-name{font-size:.7rem}
  .tbl-head span{font-size:.46rem}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <svg class="spl-logo" width="72" height="72" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#08080e"/>
    <!-- Outer hexagon frame -->
    <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" stroke="#e4ff3c" stroke-width="2.5" fill="none"/>
    <!-- Football: central pentagon -->
    <polygon points="50,36 58,42 55,52 45,52 42,42" stroke="#e4ff3c" stroke-width="1.8" fill="none"/>
    <!-- Football: surrounding hexagon patches -->
    <polygon points="50,22 60,28 60,36 50,36 42,28" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>
    <polygon points="60,36 70,38 72,48 62,54 55,52 58,42" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>
    <polygon points="58,54 62,64 52,70 44,64 45,52 55,52" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>
    <polygon points="42,42 45,52 44,64 34,62 28,52 30,40" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>
    <polygon points="40,28 50,22 58,28 55,36 42,36 38,30" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>
    <!-- Corner dots -->
    <circle cx="50" cy="6"  r="2.5" fill="#3cffe0"/>
    <circle cx="88" cy="28" r="2.5" fill="#3cffe0"/>
    <circle cx="88" cy="72" r="2.5" fill="#3cffe0"/>
    <circle cx="50" cy="94" r="2.5" fill="#3cffe0"/>
    <circle cx="12" cy="72" r="2.5" fill="#3cffe0"/>
    <circle cx="12" cy="28" r="2.5" fill="#3cffe0"/>
  </svg>
  <div class="spl-name">BL TICK-R</div>
  <div class="spl-sub">Bundesliga 2025 / 26</div>
  <div class="spl-bar"></div>
</div>

<!-- HEADER -->
<header>
  <svg class="hdr-logo" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#08080e"/>
    <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" stroke="#e4ff3c" stroke-width="2.5" fill="none"/>
    <polygon points="50,36 58,42 55,52 45,52 42,42" stroke="#e4ff3c" stroke-width="1.8" fill="none"/>
    <polygon points="50,22 60,28 60,36 50,36 42,28" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>
    <polygon points="60,36 70,38 72,48 62,54 55,52 58,42" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>
    <polygon points="58,54 62,64 52,70 44,64 45,52 55,52" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>
    <polygon points="42,42 45,52 44,64 34,62 28,52 30,40" stroke="#e4ff3c" stroke-width="1.4" fill="rgba(228,255,60,0.07)"/>

<script>
const APP_VERSION = 'v1.7.1';
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;'); }
const EMBEDDED = {
  groups: Array.from({length:34},(_, i)=>({groupOrderID:i+1,groupName:`${i+1}. Spieltag`})),
  matches: {}
};

const API = 'https://api.openligadb.de';
const SEASON = '2025';
const SERVER_URL = 'https://bltickr.fly.dev';
let curLeague = (['bl1','bl2'].includes(localStorage.getItem('bl_league')) ? localStorage.getItem('bl_league') : 'bl1');


const STADIUMS = {
  'FC Bayern München':'Allianz Arena, München','Borussia Dortmund':'Signal Iduna Park, Dortmund',
  'Bayer 04 Leverkusen':'BayArena, Leverkusen','RB Leipzig':'Red Bull Arena, Leipzig',
  'VfB Stuttgart':'MHPArena, Stuttgart','Eintracht Frankfurt':'Deutsche Bank Park, Frankfurt',
  'SC Freiburg':'Europa-Park Stadion, Freiburg','1. FC Union Berlin':'Stadion an der Alten Försterei',
  'Borussia Mönchengladbach':'Borussia-Park, Mönchengladbach','TSG Hoffenheim':'PreZero Arena, Sinsheim',
  'VfL Wolfsburg':'Volkswagen Arena, Wolfsburg','FC Augsburg':'WWK Arena, Augsburg',
  '1. FSV Mainz 05':'Mewa Arena, Mainz','SV Werder Bremen':'wohninvest WESERSTADION, Bremen',
  '1. FC Heidenheim 1846':'Voith-Arena, Heidenheim','1. FC Köln':'RheinEnergieStadion, Köln',
  'FC St. Pauli':'Millerntor-Stadion, Hamburg','Hamburger SV':'Volksparkstadion, Hamburg',
};
const ABBR = {
  'FC Bayern München':'FCB','Borussia Dortmund':'BVB','Bayer 04 Leverkusen':'B04',
  'RB Leipzig':'RBL','VfB Stuttgart':'VFB','Eintracht Frankfurt':'SGE','SC Freiburg':'SCF',
  '1. FC Union Berlin':'FCU','Borussia Mönchengladbach':'BMG','TSG Hoffenheim':'TSG',
  'TSG 1899 Hoffenheim':'TSG','VfL Wolfsburg':'WOB','FC Augsburg':'FCA','1. FSV Mainz 05':'M05',
  'SV Werder Bremen':'SVW','1. FC Heidenheim 1846':'FCH','1. FC Köln':'KOE',
  'FC St. Pauli':'STP','Hamburger SV':'HSV',
};

let groups=[], curGID=null, cache={}, curMatches=[], usingEmbedded=false;
let liveGID=null; // Spieltag mit aktiven Live-Spielen (ligaweit, unabhängig von curGID)
let tableData=null, tableData2=null, goalGettersData=null, goalGettersData2=null, curView='spiele';
let favorites = new Set(JSON.parse(localStorage.getItem('bl_favorites') || '[]'));

function updateLiveBadge() {
  const badge = document.getElementById('liveBadge');
  const isOn = liveGID !== null;
  const isLink = isOn && liveGID !== curGID;
  badge.classList.toggle('on', isOn);
  badge.classList.toggle('link', isLink);
  badge.title = isLink ? `Live-Spieltag ${liveGID} anzeigen` : '';
  badge.onclick = isLink ? () => selMD(liveGID) : null;
}

async function apiFetch(path) {
  const r = await fetch(API + path, {signal: AbortSignal.timeout(6000)});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function initLeague() {
  // Reset per-league state
  groups = []; curGID = null; cache = {}; curMatches = []; matchSnapshot = {}; liveGID = null;
  clearTimeout(refreshTimer);
  document.getElementById('mdNav').innerHTML = '<div style="display:flex;align-items:center;padding:0 8px"><div class="spin" style="width:18px;height:18px;border-width:2px"></div></div>';

  try {
    groups = await apiFetch(`/getavailablegroups/${curLeague}/${SEASON}`);
    groups.sort((a,b)=>a.groupOrderID-b.groupOrderID);
    curGID = await findClosestGroupID(groups);
    if (curLeague === 'bl1') usingEmbedded = false;
  } catch(e) {
    if (curLeague === 'bl1') {
      // Fallback zu eingebetteten Daten für BL1
      groups = EMBEDDED.groups;
      curGID = EMBEDDED.groups[EMBEDDED.groups.length - 1].groupOrderID;
      usingEmbedded = true;
      for (const [gid, ms] of Object.entries(EMBEDDED.matches)) {
        cache[parseInt(gid)] = ms;
      }
    } else {
      // BL2 hat kein Embedded-Fallback
      groups = Array.from({length:34},(_,i)=>({groupOrderID:i+1,groupName:`${i+1}. Spieltag`}));
      curGID = groups[groups.length-1].groupOrderID;
    }
  }

  renderNav();
  await loadMD(curGID);
  loadTable(); // Tabelle im Hintergrund vorausladen
}

// Findet per Binärsuche den Spieltag, dessen Mitteldatum am nächsten an heute liegt.
// Cached Spieltage automatisch → loadMD braucht keinen Extra-Call für den Treffer.
async function findClosestGroupID(groups) {
  const now = new Date();
  const minGID = groups[0].groupOrderID;
  const maxGID = groups[groups.length-1].groupOrderID;

  async function getCenter(gid) {
    if (!cache[gid]) {
      try { cache[gid] = await apiFetch(`/getmatchdata/${curLeague}/${SEASON}/${gid}`); }
      catch { cache[gid] = []; }
    }
    const ms = cache[gid];
    if (!ms.length) return null;
    const ts = ms.map(m => new Date(m.matchDateTimeUTC).getTime());
    return new Date(ts.reduce((a,b)=>a+b,0) / ts.length);
  }

  // Binärsuche: Grenze finden wo Spieltag-Mitteldatum today überschreitet
  let lo = minGID, hi = maxGID;
  while (hi - lo > 2) {
    const mid = Math.floor((lo + hi) / 2);
    const c = await getCenter(mid);
    if (!c || c <= now) lo = mid; else hi = mid;
  }

  // Unter den 3 Kandidaten den nächstgelegenen wählen
  let bestGID = lo, bestDist = Infinity;
  for (let gid = lo; gid <= Math.min(hi, maxGID); gid++) {
    const c = await getCenter(gid);
    if (!c) continue;
    const d = Math.abs(c - now);
    if (d < bestDist) { bestDist = d; bestGID = gid; }
  }
  return bestGID;
}

async function switchLeague(league) {
  if (league === curLeague) return;
  curLeague = league;
  localStorage.setItem('bl_league', league);
  document.getElementById('lseg-bl1').classList.toggle('active', league === 'bl1');
  document.getElementById('lseg-bl2').classList.toggle('active', league === 'bl2');
  await initLeague();
}

(async function init() {
  setTimeout(()=>{
    const s=document.getElementById('splash');
    s.classList.add('gone');
    setTimeout(()=>s.style.display='none',450);
  },2400);

  // Version anzeigen
  document.querySelectorAll('.hdr-sub, .spl-sub').forEach(el => {
    el.textContent += ' · ' + APP_VERSION;
  });

  // Korrekten League-Button aktivieren
  document.getElementById('lseg-bl1').classList.toggle('active', curLeague === 'bl1');
  document.getElementById('lseg-bl2').classList.toggle('active', curLeague === 'bl2');

  // Favoriten-Button Badge aktualisieren
  updateFavsBtn();

  await registerSW();

  // Bestehende Push-Subscription erkennen (Wiederkehrender Nutzer)
  if (swRegistration) {
    const existingSub = await swRegistration.pushManager.getSubscription().catch(()=>null);
    if (existingSub && Notification.permission === 'granted') {
      notificationsEnabled = true;
      updateNotifBtn();
      // Server nach Neustart wieder informieren (fire & forget) — Key aktualisieren
      fetch(`${SERVER_URL}/subscribe`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...existingSub.toJSON(), favorites: [...favorites] }),
      }).then(r => r.ok ? r.json() : null)
        .then(d => { if (d?.key) localStorage.setItem('bl_push_key', d.key); })
        .catch(() => {});
    }
  }

  await initLeague();
})();

function renderNav() {
  document.getElementById('mdNav').innerHTML = groups.map(g=>
    `<button class="md-tab${g.groupOrderID===curGID?' active':''}" onclick="selMD(${g.groupOrderID})">${g.groupName}</button>`
  ).join('');
  setTimeout(()=>{
    const a=document.querySelector('.md-tab.active');
    if(a) a.scrollIntoView({block:'nearest',inline:'center'});
  },60);
}

async function selMD(gid) {
  clearTimeout(refreshTimer);
  curGID=gid; renderNav(); updateLiveBadge(); await loadMD(gid);
}

async function loadMD(gid) {
  document.getElementById('main').innerHTML='<div class="state"><div class="spin"></div><div class="lbl">Lade Spiele…</div></div>';
  try {
    if (!cache[gid]) {
      if (usingEmbedded) {
        // No data for this matchday in embedded — try API anyway
        try {
          cache[gid] = await apiFetch(`/getmatchdata/${curLeague}/${SEASON}/${gid}`);
          usingEmbedded = false;
        } catch {
          document.getElementById('main').innerHTML=`
            <div class="state"><div class="ico">📡</div><div class="lbl">Spieltag ${gid} — nur online verfügbar</div></div>
            <div class="api-note">Öffne die App in deinem Browser für alle Spieltage via OpenLigaDB</div>`;
          return;
        }
      } else {
        cache[gid] = await apiFetch(`/getmatchdata/${curLeague}/${SEASON}/${gid}`);
      }
    }
    curMatches = cache[gid];
    matchSnapshot = buildSnapshot(curMatches);
    preloadTeamIcons(curMatches);
    renderMD();
    scheduleRefresh(curMatches);
  } catch(e) {
    document.getElementById('main').innerHTML='<div class="state"><div class="ico">⚠</div><div class="lbl">Daten nicht verfügbar</div></div>';
  }
}

function renderMD() {
  if (!curMatches||!curMatches.length) {
    document.getElementById('main').innerHTML='<div class="state"><div class="ico">⚽</div><div class="lbl">Keine Spiele</div></div>'; return;
  }
  const now=new Date();
  const hasLive=curMatches.some(m=>!m.matchIsFinished&&new Date(m.matchDateTimeUTC)<=now);
  if (hasLive) liveGID=curGID;
  else if (liveGID===curGID) liveGID=null;
  updateLiveBadge();

  const byDate={};
  curMatches.forEach(m=>{
    const dk=new Date(m.matchDateTimeUTC).toDateString();
    if(!byDate[dk]) byDate[dk]=[];
    byDate[dk].push(m);
  });

  // Explizit nach Datum sortieren — verhindert Verschiebung bei Live-Spielen
  const sortedDays = Object.keys(byDate).sort((a,b)=>new Date(a)-new Date(b));

  let html='';
  for(const dk of sortedDays){
    const ms=byDate[dk];
    const d=new Date(dk);
    html+=`<div class="day-hd">${d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</div>`;
    html+='<div class="grid">';
    ms.forEach(m=>html+=renderCard(m));
    html+='</div>';
  }
  document.getElementById('main').innerHTML=html;
}

function renderCard(m) {
  const now=new Date(), ko=new Date(m.matchDateTimeUTC);
  const fin=m.matchIsFinished, live=!fin&&ko<=now;
  const res=m.matchResults?.find(r=>r.resultTypeID===2)??m.matchResults?.[m.matchResults.length-1];
  const g1=res?res.pointsTeam1:0, g2=res?res.pointsTeam2:0;
  const chipCls=fin?'chip-f':live?'chip-l':'chip-s';
  const chipTxt=fin?'Abpfiff':live?'Live':fmtTime(ko);
  const scoreHtml=(fin||live)?`<div class="sv">${g1} : ${g2}</div><div class="sl">${fin?'Endstand':'Live'}</div>`:`<div class="sv up">–</div><div class="sl">Anstoß</div>`;

  let bottom='';
  if(fin){
    const hw=g1>g2,aw=g2>g1;
    bottom=`<div class="pbar">
      <div class="pc${hw?' w':''}"><div class="pl">Heim</div><div class="pv ${hw?'pv-g':aw?'pv-r':'pv-d'}">${hw?'✓ Sieg':aw?'✗ Niederl.':'— Remis'}</div></div>
      <div class="pc${!hw&&!aw?' w':''}"><div class="pl">Ergebnis</div><div class="pv pv-d">${g1} : ${g2}</div></div>
      <div class="pc${aw?' w':''}"><div class="pl">Auswärts</div><div class="pv ${aw?'pv-g':hw?'pv-r':'pv-d'}">${aw?'✓ Sieg':hw?'✗ Niederl.':'— Remis'}</div></div>
    </div>`;
  }

  const t1=m.team1, t2=m.team2;
  const venue = m.location ? `${m.location.locationStadium}` : (STADIUMS[t1.teamName]||'Stadion');

  return `<div class="card" onclick="openPanel(${m.matchID})">
    <div class="c-head">
      <div style="display:flex;align-items:center;gap:7px">
        <span class="chip ${chipCls}"><span class="cdot"></span>${chipTxt}</span>
        <span style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted2)">${fmtDate(ko)}</span>
      </div>
      <div class="c-venue">📍 ${venue}</div>
    </div>
    <div class="c-body">
      <div class="tm">${logo(t1,false)}<div class="tm-name">${t1.teamName}</div><div class="tm-short">${abbr(t1.teamName)}</div></div>
      <div class="sbox">${scoreHtml}</div>
      <div class="tm away">${logo(t2,true)}<div class="tm-name" style="text-align:right">${t2.teamName}</div><div class="tm-short">${abbr(t2.teamName)}</div></div>
    </div>
    ${bottom}
  </div>`;
}

function logo(team,right){
  const s=right?'margin-left:auto':'', a=abbr(team.teamName);
  const inner=team.teamIconUrl?`<img src="${escAttr(team.teamIconUrl)}" alt="${escAttr(a)}" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span>${escAttr(a)}</span>')">`:`<span>${a}</span>`;
  return `<div class="tm-logo" style="${s}">${inner}</div>`;
}

function preloadTeamIcons(matches) {
  for (const m of matches) {
    if (m.team1?.teamIconUrl) { const i=new Image(); i.src=m.team1.teamIconUrl; }
    if (m.team2?.teamIconUrl) { const i=new Image(); i.src=m.team2.teamIconUrl; }
  }
}
function abbr(n){return ABBR[n]||n.replace(/^(1\.\s|FC\s|SV\s|VfL\s|VfB\s|TSG\s|SC\s)/,'').substring(0,3).toUpperCase()}

async function openPanel(mid) {
  const m=curMatches.find(x=>x.matchID===mid); if(!m) return;
  const now=new Date(), ko=new Date(m.matchDateTimeUTC);
  const fin=m.matchIsFinished, live=!fin&&ko<=now;
  const t1=m.team1, t2=m.team2;
  const res=m.matchResults?.find(r=>r.resultTypeID===2)??m.matchResults?.[m.matchResults.length-1];
  const htRes=m.matchResults?.find(r=>r.resultTypeID===1);
  const g1=res?res.pointsTeam1:0, g2=res?res.pointsTeam2:0;

  document.getElementById('ptitle').textContent=`${abbr(t1.teamName)} · ${abbr(t2.teamName)}`;
  document.getElementById('ov').classList.add('on');
  document.getElementById('pnl').classList.add('on');

  // Parallel: ensure tableData + goalgetters are loaded (liga-spezifisch)
  const isBL2 = curLeague === 'bl2';
  const tblReady = isBL2 ? tableData2 : tableData;
  const ggCache = isBL2 ? goalGettersData2 : goalGettersData;
  const [, gg] = await Promise.all([
    tblReady ? Promise.resolve() : loadTable(),
    ggCache
      ? Promise.resolve(ggCache)
      : apiFetch(`/getgoalgetters/${curLeague}/${SEASON}`)
          .then(d=>{ if(isBL2) goalGettersData2=d; else goalGettersData=d; return d; })
          .catch(()=>null)
  ]);
  const goalGetters = gg || (isBL2 ? goalGettersData2 : goalGettersData) || [];

  // ── Tabellenstand ──
  const activeTbl = isBL2 ? tableData2 : tableData;
  function teamTableEntry(teamName) {
    if (!activeTbl) return null;
    const idx = activeTbl.findIndex(t=>t.teamName===teamName);
    if (idx === -1) return null;
    const t = activeTbl[idx], pos = idx + 1;
    const zoneColor = pos<=4?'var(--acc)':pos<=6?'var(--acc2)':pos===16?'var(--orange)':pos>=17?'var(--red)':'var(--muted)';
    const diff = t.goalDiff > 0 ? `+${t.goalDiff}` : `${t.goalDiff}`;
    return {pos, pts: t.points, diff, goals: `${t.goals}:${t.opponentGoals}`, zoneColor};
  }
  const te1 = teamTableEntry(t1.teamName);
  const te2 = teamTableEntry(t2.teamName);
  function tableCell(te, align='left') {
    if (!te) return `<div style="background:var(--s2);border-radius:4px;padding:10px 12px;text-align:${align}"><div class="empty" style="padding:4px 0">–</div></div>`;
    const r = align==='right';
    return `<div style="background:var(--s2);border-radius:4px;padding:10px 12px;text-align:${align}">
      <div style="display:flex;align-items:center;gap:6px;${r?'justify-content:flex-end':''}">
        <span style="width:8px;height:8px;border-radius:50%;background:${te.zoneColor};flex-shrink:0;${r?'order:1':''}"></span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--acc);line-height:1">${te.pos}.</span>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.5px;color:var(--muted2);margin-top:3px">${te.pts} Pkt · ${te.diff}</div>
      <div style="font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.5px;color:var(--muted);margin-top:1px">${te.goals} Tore</div>
    </div>`;
  }
  const tableSection = (te1||te2) ? `
    <div class="sec">
      <div class="sechd">Tabellenstand</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${tableCell(te1,'left')}${tableCell(te2,'right')}
      </div>
    </div>` : '';

  // ── Tore & Torschützen ──
  const ggMap = Object.fromEntries(goalGetters.filter(g=>!g.isOwnGoal).map(g=>[g.goalGetterName, g.goalCount]));
  const goals=m.goals||[];
  let evHtml='';
  if(!fin&&!live){
    evHtml=`<div class="empty">Spiel noch nicht angepfiffen</div>`;
  } else if(!goals.length){
    evHtml=`<div class="empty">Keine Torereignisse verfügbar</div>`;
  } else {
    evHtml=goals
      .slice().sort((a,b)=>(a.matchMinute||0)-(b.matchMinute||0))
      .map(g=>{
        const ico=g.isOwnGoal?'🔴':g.isPenalty?'🎯':'⚽';
        const typ=g.isOwnGoal?'Eigentor':g.isPenalty?'Elfmeter':'Tor';
        const seasonGoals = !g.isOwnGoal && ggMap[g.goalGetterName] != null ? ` · ${ggMap[g.goalGetterName]} Saisontore` : '';
        return `<div class="evrow">
          <div class="evmin">${g.matchMinute||'?'}'</div>
          <div class="evico">${ico}</div>
          <div>
            <div class="evp">${g.goalGetterName||'Unbekannt'}</div>

// ══════════════════════════════════════════════
// ── AUTO-REFRESH & NOTIFICATION ENGINE ──
// ══════════════════════════════════════════════

let refreshTimer = null;
let notificationsEnabled = false;
// Snapshot: matchID → { goals: number, finished: bool }
let matchSnapshot = {};
// Dedup: verhindert doppelte Toasts wenn Push + autoRefresh dasselbe Event erkennen
const recentToasts = new Map(); // dedupeKey → Ablauf-Timestamp
function markToast(key) { recentToasts.set(key, Date.now() + 10 * 60 * 1000); }
function isDupToast(key) {
  const exp = recentToasts.get(key);
  if (!exp) return false;
  if (Date.now() > exp) { recentToasts.delete(key); return false; }
  return true;
}

const REFRESH_INTERVAL = 60_000; // 60s

// ── Snapshot helpers ──
function buildSnapshot(matches) {
  const snap = {};
  for (const m of matches) {
    const res = m.matchResults?.find(r => r.resultTypeID === 2) ?? m.matchResults?.[m.matchResults.length-1];
    snap[m.matchID] = {
      goals: (m.goals || []).length,
      finished: m.matchIsFinished,
      g1: res ? res.pointsTeam1 : 0,
      g2: res ? res.pointsTeam2 : 0,
      lastGoalId: m.goals?.length ? m.goals[m.goals.length-1].goalID : null,
    };
  }
  return snap;
}

function isLiveMatch(m) {
  const now = new Date();
  return !m.matchIsFinished && new Date(m.matchDateTimeUTC) <= now;
}

function hasLiveMatches(matches) {
  return matches.some(isLiveMatch);
}

function hasUpcomingKickoff(matches) {
  // Check if any match kicks off within the next 5 minutes
  const now = new Date();
  return matches.some(m => {
    const ko = new Date(m.matchDateTimeUTC);
    return !m.matchIsFinished && ko > now && (ko - now) <= 5 * 60 * 1000;
  });
}

// ── Timer control ──
function scheduleRefresh(matches) {
  clearTimeout(refreshTimer);
  if (usingEmbedded) return; // no live data in preview mode
  const needsLive = hasLiveMatches(matches) || hasUpcomingKickoff(matches) || liveGID !== null;
  if (needsLive) {
    refreshTimer = setTimeout(() => autoRefresh(), REFRESH_INTERVAL);
    updateRefreshTs();
  } else {
    // No live games — set timer to check again when next game starts
    const now = new Date();
    const nextKo = matches
      .filter(m => !m.matchIsFinished && new Date(m.matchDateTimeUTC) > now)
      .map(m => new Date(m.matchDateTimeUTC))
      .sort((a,b) => a-b)[0];
    if (nextKo) {
      const delay = Math.max(nextKo - now, 30_000);
      refreshTimer = setTimeout(() => autoRefresh(), delay);
    }
  }
}

function updateRefreshTs(isRefreshing = false) {
  const el = document.getElementById('refreshTs');
  if (!el) return;
  if (isRefreshing) { el.textContent = ''; return; }
  const now = new Date();
  el.textContent = `↺ ${now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}`;
}

// ── Manual refresh ──
async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  updateRefreshTs(true);
  clearTimeout(refreshTimer);
  delete cache[curGID];
  if (curLeague === 'bl2') { tableData2 = null; goalGettersData2 = null; }
  else { tableData = null; goalGettersData = null; }
  await loadMD(curGID);
  if (curView === 'tabelle') await loadTable();
  btn.classList.remove('spinning');
  updateRefreshTs();
}

// ── Auto refresh (silent) ──
async function autoRefresh() {
  if (usingEmbedded) return;
  const prevSnap = { ...matchSnapshot };
  try {
    const fresh = await apiFetch(`/getmatchdata/${curLeague}/${SEASON}/${curGID}`);
    cache[curGID] = fresh;
    curMatches = fresh;

    // Diff against previous snapshot
    const newSnap = buildSnapshot(fresh);
    diffAndNotify(prevSnap, newSnap, fresh);
    matchSnapshot = newSnap;

    preloadTeamIcons(fresh);
    renderMD();
    updateRefreshTs();

    // Tabelle bei laufenden Spielen (Live-Tabelle) und nach Abpfiff aktualisieren
    const anyLive = hasLiveMatches(fresh);
    const anyFinished = fresh.some(m => m.matchIsFinished && prevSnap[m.matchID] && !prevSnap[m.matchID].finished);
    if (anyLive || anyFinished) {
      if (curLeague === 'bl2') tableData2 = null; else tableData = null;
      if (curView === 'tabelle') loadTable();
    }

    // Background-Check: liveGID aktuell halten wenn User auf anderem Spieltag blättert
    if (liveGID && liveGID !== curGID) {
      apiFetch(`/getmatchdata/${curLeague}/${SEASON}/${liveGID}`)
        .then(liveMatches => {
          cache[liveGID] = liveMatches;
          if (!hasLiveMatches(liveMatches)) { liveGID = null; }
          updateLiveBadge();
        })
        .catch(() => {});
    }

    scheduleRefresh(fresh);
  } catch(e) {
    scheduleRefresh(curMatches); // retry later
  }
}

// ── Diff & notify ──
function diffAndNotify(prev, next, matches) {
  if (!notificationsEnabled) return;
  for (const m of matches) {
    const id = m.matchID;
    const p = prev[id];
    const n = next[id];
    if (!p || !n) continue;

    // Favoriten-Filter: nur Spiele mit Lieblingsteams benachrichtigen
    if (favorites.size > 0 && !favorites.has(m.team1.teamName) && !favorites.has(m.team2.teamName)) continue;

    const t1 = m.team1.shortName, t2 = m.team2.shortName;

    // Anstoß — match just went live
    if (!isLiveMatchBySnap(p, m) && isLiveMatch(m)) {
      const k = id + '-anstoß';
      if (!isDupToast(k)) { markToast(k); pushNotif('⚽ Anstoß', `${t1} – ${t2} hat begonnen`, 'anstoß'); }
    }

    // Tor — new goal detected
    if (n.goals > p.goals) {
      const newGoals = (m.goals || []).slice(p.goals);
      for (const g of newGoals) {
        const ico = g.isOwnGoal ? '🔴' : g.isPenalty ? '🎯' : '⚽';
        const typ = g.isOwnGoal ? 'Eigentor' : g.isPenalty ? 'Elfmeter' : 'Tor';
        const s1 = g.scoreTeam1 ?? n.g1;
        const s2 = g.scoreTeam2 ?? n.g2;
        const k = id + '-tor-' + s1 + '-' + s2;
        if (!isDupToast(k)) { markToast(k); pushNotif(`${ico} Tor! ${s1}:${s2}`, `${g.goalGetterName||'Unbekannt'} (${g.matchMinute}') · ${t1} – ${t2}`, 'tor'); }
      }
    }

    // Abpfiff — match just finished
    if (!p.finished && n.finished) {
      const k = id + '-abpfiff';
      if (!isDupToast(k)) { markToast(k); pushNotif('🏁 Abpfiff', `${t1} ${n.g1}:${n.g2} ${t2} · Endstand`, 'abpfiff'); }
    }
  }
}

function isLiveMatchBySnap(snap, m) {
  // Was it live in the previous snapshot?
  return !snap.finished && new Date(m.matchDateTimeUTC) <= new Date();
}

// ── Service Worker registration ──
let swRegistration = null;

async function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swRegistration = await navigator.serviceWorker.register('sw.js', { scope: '/bltickr/' });
    console.log('[SW] Registered:', swRegistration.scope);

    // Erkennt wenn ein neuer SW aktiviert wird (nach Deploy)
    swRegistration.addEventListener('updatefound', () => {
      const newWorker = swRegistration.installing;
      newWorker?.addEventListener('statechange', () => {
        if (newWorker.state === 'activated' && notificationsEnabled) {
          // Subscription neu registrieren damit der neue SW die Pushes empfängt
          console.log('[SW] Update aktiviert — re-subscribe Push');
          subscribeToPush().catch(console.warn);
        }
      });
    });

    // Listen for SW messages (e.g. OPEN_MATCH from notification click)
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'OPEN_MATCH' && e.data.matchId) {
        const m = curMatches.find(x => x.matchID === e.data.matchId);
        if (m) openPanel(m.matchID);
      }
      // Push kam während App offen war — System-Notification sofort schließen
      // und stattdessen In-App-Toast anzeigen (verhindert Doppel-Anzeige)
      if (e.data?.type === 'PUSH_EVENT' && e.data.data) {
        const { title, body, type, dedupeKey } = e.data.data;
        // dedupeKey markieren damit diffAndNotify dasselbe Event nicht nochmals anzeigt
        if (dedupeKey) markToast(dedupeKey);
        const ico = type === 'tor' ? '⚽' : type === 'anstoß' ? '🟢' : '🏁';
        showToast(ico, title, body);
        swRegistration?.getNotifications?.()
          .then(notifications => notifications.forEach(n => n.close()))
          .catch(() => {});
      }
    });

    // App kommt in Vordergrund → offene Notifications schließen
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        swRegistration?.getNotifications?.()
          .then(notifications => notifications.forEach(n => n.close()))
          .catch(() => {});
      }
    });
  } catch(err) {
    console.warn('[SW] Registration failed:', err);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

// Returns 'push' wenn volles Web Push klappt, 'browser' als Fallback (nur offener Tab)
async function subscribeToPush() {
  const vapidKey = document.querySelector('meta[name="vapid-public-key"]')?.content;

  // Versuche volles Web Push (Service Worker + Server)
  if (swRegistration && vapidKey) {
    try {
      const subscription = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidKey),
      });
      // Server-Registrierung versuchen — kein harter Fehler wenn Functions fehlen
      try {
        const res = await fetch(`${SERVER_URL}/subscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...subscription.toJSON(), favorites: [...favorites] }),
        });
        if (res.ok) {
          const data = await res.json();
          if (data.key) localStorage.setItem('bl_push_key', data.key);
          return 'push'; // Volles Push aktiv ✓
        }
        console.warn('[Push] Server:', res.status, '— nur In-Tab Notifications');
      } catch(e) {
        console.warn('[Push] push-subscribe nicht erreichbar:', e.message);
      }
    } catch(e) {
      console.warn('[Push] pushManager.subscribe fehlgeschlagen:', e.message);
    }
  }

  // Fallback: Browser Notification API (nur bei offenem Tab)
  return 'browser';
}

async function unsubscribeFromPush() {
  if (!swRegistration) return;
  const sub = await swRegistration.pushManager.getSubscription();
  if (sub) await sub.unsubscribe();
}

// ── Notifications toggle ──
async function toggleNotifications() {
  if (notificationsEnabled) {
    notificationsEnabled = false;
    await unsubscribeFromPush();
    updateNotifBtn();
    showToast('🔕', 'Benachrichtigungen deaktiviert', 'Du erhältst keine Live-Alerts mehr');
    return;
  }

  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    showToast('⚠️', 'Nicht unterstützt', 'Dein Browser unterstützt keine Push-Benachrichtigungen');
    return;
  }

  // Request permission
  let perm = Notification.permission;
  if (perm === 'default') perm = await Notification.requestPermission();

  if (perm !== 'granted') {
    showToast('🚫', 'Berechtigung verweigert', 'Bitte erlaube Benachrichtigungen in den Browser-Einstellungen');
    return;
  }

  try {
    const btn = document.getElementById('notifBtn');
    btn.classList.add('spinning');

    const mode = await subscribeToPush();

    notificationsEnabled = true;
    updateNotifBtn();
    if (mode === 'push') {
      showToast('🔔', 'Push-Alerts aktiviert', 'Tor, Anstoß & Abpfiff — auch bei geschlossenem Tab');
    } else {
      showToast('🔔', 'Benachrichtigungen aktiv', 'Alerts bei offenem Tab · Push-Server noch nicht verbunden');
    }
  } catch(err) {
    console.error('[Push] Subscribe error:', err);
    showToast('⚠️', 'Fehler beim Aktivieren', err.message);
  } finally {
    document.getElementById('notifBtn')?.classList.remove('spinning');
  }
}

async function saveFavorites() {

  // Push-Subscription mit neuen Favoriten aktualisieren
  if (notificationsEnabled) {
    subscribeToPush().catch(e=>console.warn('[Favorites] Re-subscribe:', e.message));
  }
}

async function sendPushTest() {
  const btn = document.getElementById('pushTestBtn');
  btn.classList.add('spinning');
  btn.disabled = true;

  try {
    const pushKey = localStorage.getItem('bl_push_key');
    let res = await fetch(`${SERVER_URL}/push-test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: pushKey ? JSON.stringify({ key: pushKey }) : undefined,
    });

    // Key veraltet (Server-Neustart) → neu registrieren und einmal wiederholen
    if (res.status === 404 && pushKey) {
      await subscribeToPush().catch(() => {});
      const freshKey = localStorage.getItem('bl_push_key');
      res = await fetch(`${SERVER_URL}/push-test`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: freshKey ? JSON.stringify({ key: freshKey }) : undefined,
      });
    }

    if (res.status === 202 || res.ok) {
      showToast('📡', 'Test gesendet', 'Push kommt gleich');
      return;
    }
    throw new Error(`HTTP ${res.status}`);

  } catch(e) {
    console.error('[Push-Test] Fehler:', e);
    showToast('⚠️', 'Test fehlgeschlagen', e.message || 'Push-Server nicht erreichbar');
  } finally {
    btn.classList.remove('spinning');
    setTimeout(() => { btn.disabled = false; }, 3_000);
  }
}


function pushNotif(title, body, type) {
  // Browser Notification API
  if (notificationsEnabled && Notification.permission === 'granted') {
    try {
      new Notification(title, {
        body,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%2308080e"/><polygon points="50,8 87,29 87,71 50,92 13,71 13,29" stroke="%23e4ff3c" stroke-width="2.5" fill="none"/><text x="50" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="%23e4ff3c">λ</text></svg>',
        tag: `blticker-${type}-${Date.now()}`,
        requireInteraction: false,
      });
    } catch(e) {}
  }
  // Always show in-app toast
  showToast(title.split(' ')[0], title.replace(/^[^\s]+\s/,''), body);
}

// ── Toast ──
let toastCounter = 0;
function showToast(ico, title, sub) {
  const wrap = document.getElementById('toast-wrap');
  const id = `toast-${toastCounter++}`;
  const el = document.createElement('div');
  el.className = 'toast';
  el.id = id;
  el.innerHTML = `<div class="toast-ico">${ico}</div><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-sub">${sub}</div></div>`;
  wrap.appendChild(el);
  // Auto-dismiss after 4s
  setTimeout(() => {
    el.classList.add('out');
    setTimeout(() => el.remove(), 260);
  }, 4000);
}


function closePanel(){document.getElementById('ov').classList.remove('on');document.getElementById('pnl').classList.remove('on')}
function fmtDate(d){return d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtTime(d){return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});
